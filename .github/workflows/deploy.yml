name: Deploy NPC EVA

# Trigger workflow on push to main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Connect to server and run deployment script
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        # Run the deployment script inside the project directory on the server
        script: |
          cd /var/www/npc_eva
          chmod +x deploy.sh
          ./deploy.sh
