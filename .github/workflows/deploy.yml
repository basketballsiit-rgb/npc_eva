name: Deploy NPC EVA

# Trigger workflow on push to main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Connect to server and run deployment script
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        password: ${{ secrets.SERVER_PASSWORD }} # Fallback to password authentication if key fails
        # Run deployment script (clones if directory does not exist)
        script: |
          if [ ! -d "/var/www/npc_eva" ]; then
            echo "Directory /var/www/npc_eva does not exist. Creating and cloning..."
            sudo mkdir -p /var/www/npc_eva
            sudo chown -R ${{ secrets.SERVER_USER }}:${{ secrets.SERVER_USER }} /var/www/npc_eva || sudo chown -R $USER:$USER /var/www/npc_eva
            git clone https://github.com/basketballsiit-rgb/npc_eva.git /var/www/npc_eva
          fi
          cd /var/www/npc_eva
          git fetch origin main
          git reset --hard origin/main
          chmod +x deploy.sh
          ./deploy.sh

